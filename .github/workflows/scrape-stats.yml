name: Scrape Hoofdklasse Stats

on:
  schedule:
    # Elke dag om 06:00, 12:00, 18:00 en 23:00 UTC
    - cron: '0 6,12,18,23 * * *'
  workflow_dispatch: # Ook handmatig te starten

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium
          playwright install-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Auto-update stats $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
